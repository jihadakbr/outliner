<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Outliner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script defer src="js/app.js"></script>
</head>
<body>

<header class="topbar">
  <button class="sidebar-toggle" id="sidebarToggle" title="Toggle projects sidebar" aria-label="Toggle sidebar">
    <span class="burger"></span>
  </button>
  <div class="brand">
    <div class="logo">OL</div>
    <div>
      <div class="brand-title">Outliner</div>
      <div class="brand-sub" id="activeProjectName">Plan, outline, present.</div>
    </div>
  </div>

  <div class="toolbar">
    <div class="tool-group">
      <label class="field">
        <span>Max depth</span>
        <input type="number" id="maxLevels" min="1" max="10" value="10" />
      </label>
    </div>

    <div class="tool-group">
      <button class="btn btn-primary" id="addRoot" title="Add top-level chapter (or hover a cell + press B below / A above, DD to delete)">
        <span class="ico">+</span> Chapter
      </button>
      <button class="btn btn-ghost" id="expandAll" title="Expand all">Expand</button>
      <button class="btn btn-ghost" id="collapseAll" title="Collapse all">Collapse</button>
    </div>

    <div class="tool-group">
      <button class="btn btn-secondary" id="saveBtn" title="Download as JSON">Save</button>
      <label class="btn btn-secondary" for="loadFile" title="Load from JSON file">Load</label>
      <input type="file" id="loadFile" accept=".json,application/json" hidden />
      <button class="btn btn-secondary" id="exportPng" title="Export current view as PNG">PNG</button>
      <button class="btn btn-danger" id="clearBtn" title="Clear everything">Clear</button>
    </div>
  </div>
</header>

<div class="layout">
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-head">
    <button class="sidebar-close" id="sidebarClose" title="Close sidebar" aria-label="Close sidebar">&times;</button>
    <button class="btn btn-primary btn-block" id="newProjectBtn" title="Create a new project">
      <span class="ico">+</span> New Project
    </button>
  </div>
  <div class="sidebar-search">
    <input type="text" id="projectSearch" placeholder="Search projects..." />
  </div>
  <div class="project-list" id="projectList"></div>
</aside>

<main class="workspace">
  <div class="paper" id="paper">
    <div class="paper-header">
      <div id="toc-title" contenteditable="true" spellcheck="false" data-placeholder="Document Title"></div>
      <div id="toc-sub" contenteditable="true" spellcheck="false" data-placeholder="Subtitle or brief summary"></div>
    </div>
    <ul class="tree" id="root"></ul>
    <div class="paper-empty" id="emptyHint">
      No items yet. Click <strong>+ Chapter</strong> to start.
    </div>
  </div>
</main>
</div>

<div class="statusbar">
  <span id="status">Ready</span>
  <span class="sep"></span>
  <span class="hint">Shortcuts:
    <kbd>Enter</kbd> new line ·
    <kbd>Ctrl</kbd>+<kbd>Enter</kbd> new item ·
    <kbd>Tab</kbd> indent (2 spaces) ·
    <kbd>Shift</kbd>+<kbd>Tab</kbd> outdent ·
    <kbd>Ctrl</kbd>+<kbd>B</kbd> bold ·
    <kbd>Ctrl</kbd>+<kbd>Del</kbd> delete ·
    hover + <kbd>A</kbd>/<kbd>B</kbd> add plain cell above/below ·
    hover + <kbd>DD</kbd> delete
  </span>
</div>

</body>
</html>
